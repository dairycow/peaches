name: peaches-trading-bot

services:
  peaches-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peaches-bot
    restart: unless-stopped
    environment:
      - LOGGING__LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - COOLTRADER__USERNAME=${COOLTRADER_USERNAME}
      - COOLTRADER__PASSWORD=${COOLTRADER_PASSWORD}
      - SCANNERS__NOTIFICATIONS__DISCORD__WEBHOOK_URL=${SCANNERS_NOTIFICATIONS_DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /opt/oauth_keys:/opt/oauth_keys:ro
    networks:
      - trading
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  peaches-bot-data:
    driver: local

networks:
  trading:
    driver: bridge
